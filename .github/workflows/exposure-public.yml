name: Public Exposure Checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

jobs:
  public-exposure:
    runs-on: ubuntu-latest
    env:
      VITE_GTM_ID: ${{ vars.VITE_GTM_ID }}
      VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
      VITE_GOOGLE_ADS_ID: ${{ vars.VITE_GOOGLE_ADS_ID }}
      VITE_GOOGLE_ADS_QUOTE_CONVERSION_LABEL: ${{ vars.VITE_GOOGLE_ADS_QUOTE_CONVERSION_LABEL }}
      VITE_LINKEDIN_PARTNER_ID: ${{ vars.VITE_LINKEDIN_PARTNER_ID }}
      VITE_LINKEDIN_QUOTE_CONVERSION_ID: ${{ vars.VITE_LINKEDIN_QUOTE_CONVERSION_ID }}
      VITE_META_PIXEL_ID: ${{ vars.VITE_META_PIXEL_ID }}
      VITE_META_QUOTE_EVENT_NAME: ${{ vars.VITE_META_QUOTE_EVENT_NAME }}
      VITE_MICROSOFT_UET_TAG_ID: ${{ vars.VITE_MICROSOFT_UET_TAG_ID }}
      VITE_MICROSOFT_UET_QUOTE_EVENT: ${{ vars.VITE_MICROSOFT_UET_QUOTE_EVENT }}
      VITE_MARKETING_EVENT_ENDPOINT: ${{ vars.VITE_MARKETING_EVENT_ENDPOINT }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
      GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
      GOOGLE_ADS_ACCESS_TOKEN: ${{ secrets.GOOGLE_ADS_ACCESS_TOKEN }}
      GOOGLE_ANALYTICS_ACCESS_TOKEN: ${{ secrets.GOOGLE_ANALYTICS_ACCESS_TOKEN }}
      GOOGLE_ANALYTICS_PROPERTY_ID: ${{ secrets.GOOGLE_ANALYTICS_PROPERTY_ID }}
      GOOGLE_TAG_MANAGER_ACCESS_TOKEN: ${{ secrets.GOOGLE_TAG_MANAGER_ACCESS_TOKEN }}
      GOOGLE_TAG_MANAGER_ACCOUNT_ID: ${{ secrets.GOOGLE_TAG_MANAGER_ACCOUNT_ID }}
      GOOGLE_TAG_MANAGER_CONTAINER_ID: ${{ secrets.GOOGLE_TAG_MANAGER_CONTAINER_ID }}
      LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      LINKEDIN_ORGANIZATION_ID: ${{ secrets.LINKEDIN_ORGANIZATION_ID }}
      LINKEDIN_AD_ACCOUNT_ID: ${{ secrets.LINKEDIN_AD_ACCOUNT_ID }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
      MICROSOFT_ADS_DEVELOPER_TOKEN: ${{ secrets.MICROSOFT_ADS_DEVELOPER_TOKEN }}
      MICROSOFT_ADS_CUSTOMER_ID: ${{ secrets.MICROSOFT_ADS_CUSTOMER_ID }}
      MICROSOFT_ADS_ACCOUNT_ID: ${{ secrets.MICROSOFT_ADS_ACCOUNT_ID }}
      MICROSOFT_ADS_REFRESH_TOKEN: ${{ secrets.MICROSOFT_ADS_REFRESH_TOKEN }}
      MICROSOFT_ADS_ACCESS_TOKEN: ${{ secrets.MICROSOFT_ADS_ACCESS_TOKEN }}
      MICROSOFT_UET_TAG_ID: ${{ secrets.MICROSOFT_UET_TAG_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Build SEO assets
        shell: bash
        run: |
          set -o pipefail
          npm run build:netlify | tee reports/build-netlify.log

      - name: Verify discovery files
        shell: bash
        run: |
          set -o pipefail
          npm run verify:discovery | tee reports/verify-discovery.log

      - name: Verify social preview images
        shell: bash
        run: |
          set -o pipefail
          npm run verify:social-images | tee reports/verify-social-images.log

      - name: Verify static SEO HTML
        shell: bash
        run: |
          set -o pipefail
          npm run verify:seo-html | tee reports/verify-seo-html.log

      - name: Verify promotion assets
        shell: bash
        run: |
          set -o pipefail
          npm run verify:promotion-assets | tee reports/verify-promotion-assets.log

      - name: Verify marketing platform environment
        shell: bash
        run: |
          set -o pipefail
          npm run verify:marketing-platform-env | tee reports/verify-marketing-platform-env.log

      - name: Verify 1Password marketing item structure
        if: env.OP_SERVICE_ACCOUNT_TOKEN != ''
        shell: bash
        run: |
          set -o pipefail
          npm run verify:marketing-1password-item -- --structure-only --op-item "EudTech Configurator Marketing Platforms" | tee reports/verify-marketing-1password-item.log

      - name: Audit external platform access
        shell: bash
        run: |
          set -o pipefail
          npm run audit:external-platform-access | tee reports/audit-external-platform-access.log

      - name: Audit exposure readiness
        shell: bash
        run: |
          set -o pipefail
          npm run audit:exposure-readiness | tee reports/audit-exposure-readiness.log

      - name: Verify live exposure
        shell: bash
        run: |
          set -o pipefail
          npm run verify:live-exposure -- --expect-commit "$GITHUB_SHA" --wait-for-commit-ms 600000 | tee reports/verify-live-exposure.log

      - name: Submit IndexNow URLs
        shell: bash
        run: |
          set -o pipefail
          npm run submit:indexnow | tee reports/submit-indexnow.log

      - name: Upload exposure reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-exposure-reports
          path: reports/
