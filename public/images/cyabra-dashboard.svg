<!-- Cyabra Dashboard Placeholder SVG -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003daa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0756c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#003daa;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#003daa;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" />
  
  <!-- Header -->
  <rect width="100%" height="70" fill="url(#headerGradient)" />
  
  <!-- Logo -->
  <g transform="translate(20, 20) scale(0.5)">
    <path fill="#FFFFFF" d="M30,8C18.95,8,10,16.95,10,28s8.95,20,20,20s20-8.95,20-20S41.05,8,30,8z"/>
    <path fill="#003daa" d="M30,12c-8.84,0-16,7.16-16,16s7.16,16,16,16s16-7.16,16-16S38.84,12,30,12z M30,40c-6.63,0-12-5.37-12-12s5.37-12,12-12s12,5.37,12,12S36.63,40,30,40z"/>
    <path fill="#FFFFFF" d="M30,22c-3.31,0-6,2.69-6,6s2.69,6,6,6s6-2.69,6-6S33.31,22,30,22z"/>
  </g>
  <text x="75" y="45" font-family="Arial" font-size="24" font-weight="bold" fill="#FFFFFF">CYABRA</text>
  
  <!-- Sidebar -->
  <rect x="0" y="70" width="200" height="530" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
  
  <!-- Sidebar Menu Items -->
  <rect x="20" y="100" width="160" height="40" rx="5" fill="#003daa" />
  <text x="50" y="125" font-family="Arial" font-size="14" fill="#FFFFFF">Dashboard</text>
  
  <text x="50" y="175" font-family="Arial" font-size="14" fill="#64748b">Analytics</text>
  <text x="50" y="215" font-family="Arial" font-size="14" fill="#64748b">Reports</text>
  <text x="50" y="255" font-family="Arial" font-size="14" fill="#64748b">Alerts</text>
  <text x="50" y="295" font-family="Arial" font-size="14" fill="#64748b">Settings</text>
  
  <!-- Main Content -->
  <text x="230" y="120" font-family="Arial" font-size="24" font-weight="bold" fill="#0f172a">Disinformation Detection Overview</text>
  <text x="230" y="150" font-family="Arial" font-size="14" fill="#64748b">Today, September 1, 2025</text>
  
  <!-- Stats Cards -->
  <rect x="230" y="180" width="220" height="120" rx="5" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
  <text x="250" y="210" font-family="Arial" font-size="14" fill="#64748b">Detected Fake Accounts</text>
  <text x="250" y="250" font-family="Arial" font-size="28" font-weight="bold" fill="#003daa">2,542</text>
  <text x="250" y="275" font-family="Arial" font-size="12" fill="#10b981">+14% from last week</text>
  
  <rect x="470" y="180" width="220" height="120" rx="5" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
  <text x="490" y="210" font-family="Arial" font-size="14" fill="#64748b">Disinformation Posts</text>
  <text x="490" y="250" font-family="Arial" font-size="28" font-weight="bold" fill="#003daa">18,392</text>
  <text x="490" y="275" font-family="Arial" font-size="12" fill="#ef4444">+23% from last week</text>
  
  <rect x="710" y="180" width="220" height="120" rx="5" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
  <text x="730" y="210" font-family="Arial" font-size="14" fill="#64748b">Brand Protection Score</text>
  <text x="730" y="250" font-family="Arial" font-size="28" font-weight="bold" fill="#003daa">86%</text>
  <text x="730" y="275" font-family="Arial" font-size="12" fill="#10b981">+5% from last week</text>
  
  <rect x="950" y="180" width="220" height="120" rx="5" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
  <text x="970" y="210" font-family="Arial" font-size="14" fill="#64748b">Active Alerts</text>
  <text x="970" y="250" font-family="Arial" font-size="28" font-weight="bold" fill="#003daa">7</text>
  <text x="970" y="275" font-family="Arial" font-size="12" fill="#ef4444">+3 new alerts</text>
  
  <!-- Main Chart -->
  <rect x="230" y="330" width="940" height="250" rx="5" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
  <text x="250" y="360" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a">Disinformation Activity Trend</text>
  
  <!-- Chart Grid -->
  <line x1="250" y1="550" x2="1150" y2="550" stroke="#e5e7eb" stroke-width="1" />
  <line x1="250" y1="500" x2="1150" y2="500" stroke="#e5e7eb" stroke-width="1" />
  <line x1="250" y1="450" x2="1150" y2="450" stroke="#e5e7eb" stroke-width="1" />
  <line x1="250" y1="400" x2="1150" y2="400" stroke="#e5e7eb" stroke-width="1" />
  
  <!-- Chart Labels -->
  <text x="240" y="550" font-family="Arial" font-size="10" fill="#64748b" text-anchor="end">0</text>
  <text x="240" y="500" font-family="Arial" font-size="10" fill="#64748b" text-anchor="end">500</text>
  <text x="240" y="450" font-family="Arial" font-size="10" fill="#64748b" text-anchor="end">1000</text>
  <text x="240" y="400" font-family="Arial" font-size="10" fill="#64748b" text-anchor="end">1500</text>
  
  <text x="250" y="565" font-family="Arial" font-size="10" fill="#64748b">Aug 1</text>
  <text x="430" y="565" font-family="Arial" font-size="10" fill="#64748b">Aug 8</text>
  <text x="610" y="565" font-family="Arial" font-size="10" fill="#64748b">Aug 15</text>
  <text x="790" y="565" font-family="Arial" font-size="10" fill="#64748b">Aug 22</text>
  <text x="970" y="565" font-family="Arial" font-size="10" fill="#64748b">Aug 29</text>
  <text x="1150" y="565" font-family="Arial" font-size="10" fill="#64748b">Sep 1</text>
  
  <!-- Chart Data Line -->
  <path d="M250,520 L430,480 L610,500 L790,420 L970,380 L1150,350" fill="none" stroke="#003daa" stroke-width="3" />
  
  <!-- Chart Data Area -->
  <path d="M250,520 L430,480 L610,500 L790,420 L970,380 L1150,350 L1150,550 L250,550 Z" fill="url(#chartGradient)" />
  
  <!-- Data Points -->
  <circle cx="250" cy="520" r="5" fill="#003daa" />
  <circle cx="430" cy="480" r="5" fill="#003daa" />
  <circle cx="610" cy="500" r="5" fill="#003daa" />
  <circle cx="790" cy="420" r="5" fill="#003daa" />
  <circle cx="970" cy="380" r="5" fill="#003daa" />
  <circle cx="1150" cy="350" r="5" fill="#003daa" />
</svg>
